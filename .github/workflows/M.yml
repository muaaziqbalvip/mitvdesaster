name: Extract ZIP to Root

on:
  push:
    paths:
      - "*.zip"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find ZIP
        id: zip
        run: |
          ZIP_FILE=$(find . -maxdepth 2 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found!"
            exit 1
          fi

          echo "ZIP Found: $ZIP_FILE"
          echo "zip=$ZIP_FILE" >> $GITHUB_OUTPUT

      - name: Extract ZIP
        run: |
          rm -rf extracted
          mkdir extracted
          unzip -o "${{ steps.zip.outputs.zip }}" -d extracted

      - name: Remove GitHub Folder
        run: |
          find extracted -type d -name ".github" -exec rm -rf {} +

      - name: Copy Files to Repository Root
        run: |
          INNER=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)

          if [ -n "$INNER" ]; then
            cp -rf "$INNER"/. .
          else
            cp -rf extracted/. .
          fi

      - name: Cleanup
        run: |
          rm -rf extracted
          rm -f *.zip

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "Auto extract ZIP"

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
